<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>London flat search</title>
<style>
  :root {
    --bg:#0f1115; --card:#181b22; --line:#262b35; --txt:#e7e9ee; --muted:#9aa3b2;
    --new:#2ecc71; --gone:#ff6b6b; --accent:#4d8dff; --slow:#f1c40f; --stale:#e67e22;
    --problem:#ff5757; --over:#c08a3e;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
    font:15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .wrap { max-width:1180px; margin:0 auto; padding:24px 18px 80px; }
  h1 { font-size:22px; margin:0 0 4px; }
  .sub { color:var(--muted); font-size:13px; margin-bottom:16px; }
  .tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:18px; border-bottom:1px solid var(--line); padding-bottom:10px; }
  .tab { background:var(--card); border:1px solid var(--line); border-radius:20px; padding:6px 13px;
    font-size:13px; cursor:pointer; color:var(--muted); white-space:nowrap; }
  .tab.active { color:var(--txt); border-color:var(--accent); }
  .tab .z { font-size:10px; color:var(--muted); margin-left:5px; }
  .areahead { margin:6px 0 14px; color:var(--muted); font-size:13px; }
  .areahead .chip { display:inline-block; font-size:10px; font-weight:700; text-transform:uppercase;
    letter-spacing:.04em; padding:2px 7px; border-radius:20px; margin-left:6px; border:1px solid var(--line); }
  .chip.t-anchor { color:#d6ffee; } .chip.t-1 { color:#bcd6ff; } .chip.t-2 { color:#cbb0ff; }
  .chip.warn { color:#ffd27a; border-color:#4a3a1a; }
  .filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .filters input, .filters select { background:var(--card); border:1px solid var(--line);
    color:var(--txt); border-radius:8px; padding:7px 10px; font-size:13px; }
  .stats { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
  .stat { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:8px 13px; min-width:84px; }
  .stat .n { font-size:20px; font-weight:700; } .stat .l { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:12px; position:relative; }
  .card.gone, .card.problem, .card.over { opacity:.62; }
  .card.gone .title { text-decoration:line-through; } .card.problem { border-color:#4a2a2a; } .card.over { border-color:#4a3a1a; }
  .card.unconfirmed { border-color:#3a3550; border-style:dashed; }
  .cardgrid { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:12px; align-items:start; }
  .cardgrid .card { margin-bottom:0; }
  @media (max-width:820px) { .cardgrid { grid-template-columns:1fr; } }
  .cardimg { display:block; width:calc(100% + 32px); height:180px; object-fit:cover; margin:-14px -16px 12px;
    border-radius:12px 12px 0 0; background:#0d0f14; }
  .card.pref-reject .cardimg { filter:grayscale(.7); }
  .row1 { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .title { font-size:17px; font-weight:600; }
  .price { margin-left:auto; font-size:18px; font-weight:700; color:var(--accent); }
  .badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; text-transform:uppercase; letter-spacing:.04em; }
  .badge.new { background:var(--new); color:#06210f; } .badge.gone { background:var(--gone); color:#2a0606; }
  .badge.slow { background:var(--slow); color:#2a2300; } .badge.stale { background:var(--stale); color:#2a1500; }
  .badge.problem { background:var(--problem); color:#2a0606; } .badge.over { background:var(--over); color:#241500; }
  .badge.btr { background:#1f6f54; color:#d6ffee; } .badge.private { background:#33384a; color:#c3cad8; }
  .badge.area { background:#222838; color:#9fb4dd; }
  .badge.btrband { background:#2a4a5e; color:#bfe3ff; }
  .badge.unconfirmed { background:#3a3550; color:#d9d0ff; } .badge.letagreed { background:#5a4a1f; color:#ffe6a0; }
  .badge.tideal { background:#1f6f54; color:#d6ffee; } .badge.tworkable { background:#5a4a1f; color:#ffe6a0; }
  .badge.tearly { background:#3a2f22; color:#e0b483; } .badge.tlate { background:#4a2330; color:#ffb3c6; } .badge.tunknown { background:#2b2f3a; color:#9aa3b2; }
  .flex { font-size:11px; color:#9fd8c2; margin-left:2px; }
  .banner { background:var(--card); border:1px solid var(--line); border-left:3px solid var(--accent); border-radius:10px;
    padding:10px 14px; margin-bottom:16px; font-size:13px; color:var(--txt); }
  .banner b { color:var(--accent); } .banner .warn { color:#ffd27a; } .banner .mut { color:var(--muted); }
  .meta { color:var(--muted); font-size:13px; margin-top:6px; display:flex; gap:14px; flex-wrap:wrap; }
  .meta .k { color:var(--txt); } .dom { font-weight:700; } .phase { font-size:12px; color:var(--muted); margin-top:6px; }
  .src { display:inline-flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .src a { font-size:12px; text-decoration:none; color:var(--accent); border:1px solid var(--line); border-radius:7px; padding:4px 9px; }
  .src a:hover { border-color:var(--accent); }
  .sect { margin:22px 0 10px; font-size:13px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
  .epc { font-weight:700; } .epc.B { color:#2ecc71; } .epc.C { color:#f1c40f; } .epc.D { color:#e67e22; }
  details { margin-top:16px; } summary { cursor:pointer; color:var(--muted); font-size:13px; text-transform:uppercase; letter-spacing:.05em; padding:6px 0; }
  footer { color:var(--muted); font-size:12px; margin-top:30px; text-align:center; } footer code { color:var(--accent); }
  /* personal want/reject controls (localStorage) */
  .prefbar { display:flex; gap:8px; margin-top:12px; }
  .pbtn { font-size:12px; font-weight:600; cursor:pointer; border-radius:8px; padding:5px 11px;
    background:transparent; border:1px solid var(--line); color:var(--muted); }
  .pbtn:hover { border-color:var(--muted); color:var(--txt); }
  .pbtn.pwant.on { background:var(--new); color:#06210f; border-color:var(--new); }
  .pbtn.preject.on { background:var(--gone); color:#2a0606; border-color:var(--gone); }
  .card.pref-want { border-color:var(--new); box-shadow:inset 0 0 0 1px var(--new); opacity:1; }
  .card.pref-want .title::before { content:"★ "; color:var(--new); }
  .card.pref-reject { opacity:.5; }
  .card.pref-reject .title { text-decoration:line-through; }
</style>
</head>

// Pure view logic. Single source of truth — its function bodies are inlined verbatim into
// flats.html (between the logic markers) so the tested logic and the rendered logic cannot drift.
function budgetTier(price, budget, scheme) {
  if (price <= budget.inMax) return "in";
  if (scheme === "btr" && budget.btrMax && price <= budget.btrMax) return "btr"; // BTR allowed above the std cap
  return "over";
}
function daysOnMarket(listedDate, nowMs) {
  if (!listedDate) return null;
  return Math.floor((nowMs - Date.parse(listedDate + "T00:00:00Z")) / 86400000);
}
function staleTier(listing, thresholds, nowMs) {
  const d = daysOnMarket(listing.listedDate, nowMs);
  if (d == null || !listing.availableNow) return "ok";
  if (d > thresholds.problem) return "problem";
  if (d > thresholds.stale) return "stale";
  if (d > thresholds.slow) return "slow";
  return "ok";
}
function tierRank(tier) {
  return tier === "anchor" ? 0 : Number(tier);
}
// --- Move-timing: earliest move-out is a step function anchored to the rent-period day. ---
// currentPeriodEnd = the anchor day (e.g. 14th) on/after the reference date.
function currentPeriodEndMs(refMs, anchorDay) {
  const r = new Date(refMs);
  let y = r.getUTCFullYear(), m = r.getUTCMonth();
  if (r.getUTCDate() > anchorDay) { m += 1; if (m > 11) { m -= 12; y += 1; } }
  return Date.UTC(y, m, anchorDay);
}
// moveOutFloor = currentPeriodEnd + noticePeriodsRequired whole rent periods (months, anchored).
function moveOutFloorMs(refMs, mt) {
  const end = new Date(currentPeriodEndMs(refMs, mt.rentPeriodAnchorDay));
  let y = end.getUTCFullYear(), m = end.getUTCMonth() + mt.noticePeriodsRequired;
  y += Math.floor(m / 12); m = ((m % 12) + 12) % 12;
  return Date.UTC(y, m, mt.rentPeriodAnchorDay);
}
// Last day notice can be served and still keep the nearest floor (= currentPeriodEnd of today).
function noticeDeadlineMs(todayMs, mt) {
  if (mt.noticeServedDate) return null; // already served → floor fixed, no deadline
  return currentPeriodEndMs(todayMs, mt.rentPeriodAnchorDay);
}
// Reference date the floor is computed from: a served notice PINS it; otherwise it rolls from today.
function timingRefMs(todayMs, mt) {
  return mt.noticeServedDate ? Date.parse(mt.noticeServedDate + "T00:00:00Z") : todayMs;
}
function availableDateMs(listing, nowMs) {
  if (listing.availableDate) return Date.parse(listing.availableDate + "T00:00:00Z");
  if (listing.availableNow) return nowMs; // available now ⇒ far before the floor ⇒ "early"
  return null;
}
// timingFit: how a listing's availability lines up with the move-out floor.
// d = days the flat is available BEFORE move-out (positive ⇒ overlap/double-rent; negative ⇒ gap).
function timingFit(listing, floorMs, mt, nowMs) {
  const a = availableDateMs(listing, nowMs);
  if (a == null) return "unknown";
  const d = Math.round((floorMs - a) / 86400000);
  if (d < 0) return "late";
  if (d <= mt.overlapIdealDays) return "ideal";
  if (d <= mt.overlapMaxDays) return "workable";
  return "early";
}
function timingRank(fit) {
  return { ideal: 0, workable: 1, unknown: 2, early: 3, late: 4 }[fit] ?? 2;
}
// timingCtx (optional) = { floorMs, moveTiming, nowMs }. When passed, well-timed flats sort first
// within their tier; omit it for the original tier→scheme→phase→price order.
function compareListings(a, b, areaById, timingCtx) {
  const at = tierRank(areaById[a.area]?.tier ?? 2) - tierRank(areaById[b.area]?.tier ?? 2);
  if (at) return at;
  if (timingCtx) {
    const tr = timingRank(timingFit(a, timingCtx.floorMs, timingCtx.moveTiming, timingCtx.nowMs)) -
               timingRank(timingFit(b, timingCtx.floorMs, timingCtx.moveTiming, timingCtx.nowMs));
    if (tr) return tr;
  }
  const sr = (a.scheme === "btr" ? 0 : 1) - (b.scheme === "btr" ? 0 : 1);
  if (sr) return sr;
  return (b.phaseYear - a.phaseYear) || (a.price - b.price);
}
function groupByArea(listings, areas) {
  return areas
    .map(area => ({ area, listings: listings.filter(x => x.area === area.id) }))
    .filter(g => g.listings.length > 0);
}
/*LOGIC_END*/

  const D = window.FLAT_DATA, M = D.meta;
  const TH = M.staleThresholdsDays, BUD = M.budget, NOW = Date.now();
  const areaById = Object.fromEntries(M.areas.map(a => [a.id, a]));

  // --- Personal want/reject preferences: client-side only, localStorage keyed by listing id. ---
  // Survives skill regen (ids are stable) and lives outside the store + pure logic. Per-device.
  const PREF_KEY = "flatPrefs.v1";
  let PREFS = {}; try { PREFS = JSON.parse(localStorage.getItem(PREF_KEY)) || {}; } catch (e) { PREFS = {}; }
  const getPref = id => PREFS[id] || null;                 // "want" | "reject" | null
  function setPref(id, v) {
    if (v) PREFS[id] = v; else delete PREFS[id];
    try { localStorage.setItem(PREF_KEY, JSON.stringify(PREFS)); } catch (e) {}
  }
  const prefRank = x => { const p = getPref(x.id); return p === "want" ? 0 : (p === "reject" ? 2 : 1); };
  // Preference is the OUTERMOST sort key — want floats to top, reject sinks; existing order applies within each.
  const comparePref = (a, b, tctx) => (prefRank(a) - prefRank(b)) || compareListings(a, b, areaById, tctx);
  // All-tab filter state, hoisted so a want/reject re-render doesn't reset the user's search/filters.
  let q = "", fArea = "", fScheme = "", fTiming = "", showOver = false, hideGone = true, wellTimedFirst = true;
  const bigImg = u => u ? u.replace("/u/480/360/", "/u/720/540/") : u; // upscale Zoopla CDN thumbnails for crisp cards
  document.getElementById("sub").textContent =
    "Last run " + M.lastRun + " · " + M.areas.length + " areas · £" + BUD.min + "–" + BUD.inMax +
    " in budget, to £" + BUD.searchMax + " shown (over collapsed) · days-on-market live · ✓/✗ on each card saves your picks (this device)";

  // --- Move-timing (recomputed live each render against today) ---
  const MT = M.moveTiming || null;
  const FLOOR = MT ? moveOutFloorMs(timingRefMs(NOW, MT), MT) : null; // served date pins it; else rolls from today
  const DEADLINE = MT ? noticeDeadlineMs(NOW, MT) : null;
  const TCTX = MT ? { floorMs: FLOOR, moveTiming: MT, nowMs: NOW } : null;
  const fmtDate = ms => new Date(ms).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric", timeZone: "UTC" });
  const stepFloor = MT ? moveOutFloorMs(DEADLINE + 86400000, MT) : null; // floor if the deadline passes
  (function renderBanner() {
    const el = document.getElementById("banner"); if (!MT) { el.style.display = "none"; return; }
    if (MT.noticeServedDate) {
      el.innerHTML = "📌 Notice served <b>" + fmtDate(Date.parse(MT.noticeServedDate + "T00:00:00Z")) +
        "</b> → move out by <b>" + fmtDate(FLOOR) + "</b> (fixed). Target a flat available within " +
        MT.overlapMaxDays + " days of that.";
      return;
    }
    const daysLeft = Math.ceil((DEADLINE - NOW) / 86400000);
    const deadlineMsg = daysLeft >= 0
      ? "Serve notice by <b>" + fmtDate(DEADLINE) + "</b> <span class=\"warn\">(" + daysLeft + " day" + (daysLeft === 1 ? "" : "s") + " left)</span> to keep it"
      : "<span class=\"warn\">notice window for that date has passed</span>";
    el.innerHTML = "🗓️ Earliest move-out if you give notice today: <b>" + fmtDate(FLOOR) + "</b>. " +
      deadlineMsg + " — after that it steps to <b>" + fmtDate(stepFloor) + "</b>. " +
      "<span class=\"mut\">Ideal flat availability: within " + MT.overlapIdealDays + " days of move-out (≤" +
      MT.overlapMaxDays + "d workable).</span>";
  })();

  const TIMING_LABEL = { ideal: "✅ timing ideal", workable: "🟡 timing workable", early: "⏳ too early", late: "⛔ after move-out", unknown: "❔ timing unknown" };
  function timingChip(x) {
    if (!MT) return "";
    const fit = timingFit(x, FLOOR, MT, NOW);
    const a = availableDateMs(x, NOW), d = a == null ? null : Math.round((FLOOR - a) / 86400000);
    let detail = "";
    if (fit === "workable" || (fit === "ideal" && d > 0)) detail = " " + d + "d overlap";
    else if (fit === "early") detail = a === NOW ? " avail now" : " " + d + "d double rent";
    else if (fit === "late") detail = " " + Math.abs(d) + "d gap";
    const flexNote = (x.scheme === "btr" && (fit === "early" || fit === "unknown"))
      ? '<span class="flex" title="BTR operators usually let you pick a future start date">· start negotiable</span>' : "";
    return ' <span class="badge t' + fit + '" title="vs earliest move-out ' + fmtDate(FLOOR) + '">' + TIMING_LABEL[fit] + detail + '</span>' + flexNote;
  }

  function flagChips(area) {
    const names = { safetyCaution:"⚠ safety", zoneCaveat:"⚠ zone 3/4", natRail:"🚂 NatRail", brandNew:"🆕 new build", mostlyOverBudget:"£ mostly >budget" };
    return (area.flags || []).map(f => '<span class="chip warn">' + (names[f] || f) + '</span>').join("");
  }
  function tierLabel(t) { return t === "anchor" ? "ANCHOR" : "TIER " + t; }

  function domBadge(x) {
    const d = daysOnMarket(x.listedDate, NOW); if (d == null) return "";
    const t = staleTier(x, TH, NOW), colour = t === "ok" ? "var(--muted)" : "var(--" + t + ")";
    const tag = t === "ok" ? "" : ' <span class="badge ' + t + '">' + t + '</span>';
    return '<span class="dom" style="color:' + colour + '">on market ' + d + 'd' + (x.availableNow ? "" : " (avail later)") + '</span>' + tag;
  }
  function card(x, showArea) {
    const st = staleTier(x, TH, NOW), bt = budgetTier(x.price, BUD, x.scheme), over = bt === "over";
    const cls = x.status === "gone" ? "gone" : (st === "problem" ? "problem" : (over ? "over" : (x.unconfirmed ? "unconfirmed" : "")));
    const pf = getPref(x.id);
    const img = x.imageUrl ? '<img class="cardimg" loading="lazy" referrerpolicy="no-referrer" alt="" src="' + bigImg(x.imageUrl) + '" onerror="this.style.display=\'none\'">' : '';
    const prefbar = '<div class="prefbar">' +
      '<button class="pbtn pwant' + (pf === "want" ? " on" : "") + '" data-id="' + x.id + '" data-pref="want" title="Want this — pin to top">✓ Want</button>' +
      '<button class="pbtn preject' + (pf === "reject" ? " on" : "") + '" data-id="' + x.id + '" data-pref="reject" title="Not interested — strike out & sink">✗ Not interested</button>' +
      '</div>';
    const badge = x.status === "gone"
      ? '<span class="badge ' + (x.goneReason === "let-agreed" ? "letagreed" : "gone") + '">' + (x.goneReason === "let-agreed" ? "let agreed" : "removed") + '</span>'
      : (x.isNew ? '<span class="badge new">new</span>' : "");
    const unconfB = (x.unconfirmed && x.status !== "gone") ? ' <span class="badge unconfirmed" title="not in the latest search results; link re-check was inconclusive — kept active, not delisted">unconfirmed</span>' : "";
    const overB = over && x.status !== "gone" ? ' <span class="badge over">over £' + BUD.inMax + '</span>'
      : (bt === "btr" && x.status !== "gone" ? ' <span class="badge btrband" title="BTR above the £' + BUD.inMax + ' standard cap, within the BTR allowance (£' + BUD.btrMax + ')">BTR band</span>' : "");
    const areaB = showArea ? ' <span class="badge area">' + areaById[x.area].name.split(" — ")[0].split(" / ")[0] + '</span>' : "";
    const epc = x.epc ? '<span class="k">EPC <span class="epc ' + x.epc + '">' + x.epc + '</span></span>' : '<span>EPC —</span>';
    const size = x.sizeSqft ? '<span><span class="k">' + x.sizeSqft + '</span> sqft</span>' : "";
    const avail = x.available ? '<span>avail <span class="k">' + x.available + '</span></span>' : "";
    const srcs = x.sources.map(s => '<a href="' + s.url + '" target="_blank" rel="noopener">' + s.platform.charAt(0).toUpperCase() + s.platform.slice(1) + ' · ' + s.agent + ' ↗</a>').join("");
    const dupe = x.sources.length > 1 ? ' <span class="badge" style="background:#33384a;color:#9aa3b2">' + x.sources.length + ' sources</span>' : "";
    const unverified = x.schemeConfidence && x.schemeConfidence !== "confirmed";
    const scheme = x.scheme === "btr"
      ? ' <span class="badge btr" title="' + (x.schemeConfidence || "") + (x.schemeSource ? " · " + x.schemeSource : "") + '">' + (unverified ? "BTR?" : "BTR") + (x.operator ? " · " + x.operator : "") + '</span>'
      : (x.scheme === "private" ? ' <span class="badge private">private landlord</span>' : "");
    return '<div class="card ' + cls + (pf ? ' pref-' + pf : '') + '">' + img + '<div class="row1"><span class="title">' + x.building + '</span>' + badge + unconfB + timingChip(x) + scheme + overB + areaB + dupe +
      '<span class="price">£' + x.price.toLocaleString() + '</span></div>' +
      '<div class="meta"><span>' + x.street + '</span>' + avail + epc + size + domBadge(x) + '<span>first seen ' + x.firstSeen + '</span></div>' +
      '<div class="phase">📅 ' + x.phaseLabel + '</div><div class="src">' + srcs + '</div>' + prefbar + '</div>';
  }
  // Split a list into shown (in-budget, active, not stale) and hidden (over / problem / gone).
  function partition(list) {
    const shown = [], over = [], problems = [], gone = [];
    for (const x of list) {
      if (x.status === "gone") gone.push(x);
      else if (staleTier(x, TH, NOW) === "problem") problems.push(x);
      else if (budgetTier(x.price, BUD, x.scheme) === "over") over.push(x);
      else shown.push(x);
    }
    return { shown, over, problems, gone };
  }
  function collapsible(label, list, showArea) {
    return list.length ? '<details><summary>' + label + ' (' + list.length + ')</summary><div class="cardgrid">' + list.map(x => card(x, showArea)).join("") + '</div></details>' : "";
  }

  function renderArea(area) {
    const list = D.listings.filter(x => x.area === area.id).sort((a, b) => comparePref(a, b, TCTX));
    const p = partition(list);
    return '<div class="areahead"><b>' + area.name + '</b> · ' + area.borough + ' · Zone ' + area.zone +
      '<span class="chip t-' + area.tier + '">' + tierLabel(area.tier) + '</span>' + flagChips(area) + '</div>' +
      '<div class="sect">In budget — well-timed, then newest block</div>' + (p.shown.length ? '<div class="cardgrid">' + p.shown.map(x => card(x, false)).join("") + '</div>' : '<div class="sub">No in-budget listings this run.</div>') +
      collapsible('💷 Over £' + BUD.inMax + ' — click to show', p.over, false) +
      collapsible('🔴 Stale — available &gt;5 months', p.problems, false) +
      collapsible('No longer listed — kept for history', p.gone, false);
  }

  function renderAll() {
    const box = document.createElement("div");
    function draw() {
      let list = D.listings.slice();
      if (fArea) list = list.filter(x => x.area === fArea);
      if (fScheme) list = list.filter(x => x.scheme === fScheme);
      if (fTiming && MT) list = list.filter(x => timingFit(x, FLOOR, MT, NOW) === fTiming);
      if (!showOver) list = list.filter(x => budgetTier(x.price, BUD, x.scheme) !== "over");
      if (hideGone) list = list.filter(x => x.status !== "gone");
      if (q) { const s = q.toLowerCase(); list = list.filter(x => (x.building + " " + x.street + " " + x.sources.map(z => z.agent).join(" ")).toLowerCase().includes(s)); }
      list.sort((a, b) => comparePref(a, b, wellTimedFirst ? TCTX : null));
      const wellTimed = MT ? list.filter(x => ["ideal", "workable"].includes(timingFit(x, FLOOR, MT, NOW))).length : 0;
      const stats = [["Showing", list.length], ["Well-timed", wellTimed], ["New", list.filter(x => x.isNew).length], ["BTR", list.filter(x => x.scheme === "btr").length]];
      box.querySelector("#allStats").innerHTML = stats.map(s => '<div class="stat"><div class="n">' + s[1] + '</div><div class="l">' + s[0] + '</div></div>').join("");
      box.querySelector("#allList").innerHTML = list.length ? '<div class="cardgrid">' + list.map(x => card(x, true)).join("") + '</div>' : '<div class="sub">Nothing matches.</div>';
    }
    const areaOpts = '<option value="">All areas</option>' + M.areas.map(a => '<option value="' + a.id + '">' + a.name.split(" — ")[0] + '</option>').join("");
    const timingSel = MT ? '<select id="ft"><option value="">Any timing</option><option value="ideal">Timing: ideal</option><option value="workable">Timing: workable</option><option value="early">Timing: too early</option><option value="late">Timing: after move-out</option><option value="unknown">Timing: unknown</option></select>' : "";
    const timingToggle = MT ? '<label style="color:var(--muted);font-size:13px"><input type="checkbox" id="fw" checked /> well-timed first</label>' : "";
    box.innerHTML =
      '<div class="filters"><input id="q" placeholder="Search building / street / agent" size="26" />' +
      '<select id="fa">' + areaOpts + '</select>' +
      '<select id="fs"><option value="">BTR + private</option><option value="btr">BTR only</option><option value="private">Private only</option></select>' +
      timingSel +
      '<label style="color:var(--muted);font-size:13px"><input type="checkbox" id="fo" /> include over-budget</label>' +
      '<label style="color:var(--muted);font-size:13px"><input type="checkbox" id="fg" /> show gone</label>' +
      timingToggle + '</div>' +
      '<div class="stats" id="allStats"></div><div id="allList"></div>';
    box.querySelector("#q").value = q;
    box.querySelector("#fa").value = fArea;
    box.querySelector("#fs").value = fScheme;
    if (MT) box.querySelector("#ft").value = fTiming;
    box.querySelector("#fo").checked = showOver;
    box.querySelector("#fg").checked = !hideGone;
    if (MT) box.querySelector("#fw").checked = wellTimedFirst;
    box.querySelector("#q").oninput = e => { q = e.target.value; draw(); };
    box.querySelector("#fa").onchange = e => { fArea = e.target.value; draw(); };
    box.querySelector("#fs").onchange = e => { fScheme = e.target.value; draw(); };
    if (MT) box.querySelector("#ft").onchange = e => { fTiming = e.target.value; draw(); };
    box.querySelector("#fo").onchange = e => { showOver = e.target.checked; draw(); };
    box.querySelector("#fg").onchange = e => { hideGone = !e.target.checked; draw(); };
    if (MT) box.querySelector("#fw").onchange = e => { wellTimedFirst = e.target.checked; draw(); };
    draw();
    return box;
  }

  const view = document.getElementById("view"), tabsEl = document.getElementById("tabs");
  const tabs = [{ id: "__all", label: "All", z: "" }].concat(M.areas.map(a => ({ id: a.id, label: a.name.split(" — ")[0].split(" / ")[0], z: "Z" + a.zone })));
  function select(id) {
    [...tabsEl.children].forEach(c => c.classList.toggle("active", c.dataset.id === id));
    view.innerHTML = "";
    if (id === "__all") view.appendChild(renderAll());
    else view.innerHTML = renderArea(areaById[id]);
  }
  tabsEl.innerHTML = tabs.map(t => '<div class="tab" data-id="' + t.id + '">' + t.label + (t.z ? '<span class="z">' + t.z + '</span>' : "") + '</div>').join("");
  [...tabsEl.children].forEach(c => c.onclick = () => select(c.dataset.id));
  // Delegated want/reject clicks: toggle the pref (click the active choice again to clear), then re-render.
  const currentTabId = () => { const a = [...tabsEl.children].find(c => c.classList.contains("active")); return a ? a.dataset.id : "beaufort-colindale"; };
  view.addEventListener("click", e => {
    const b = e.target.closest(".pbtn"); if (!b) return;
    const id = b.dataset.id, choice = b.dataset.pref;
    setPref(id, getPref(id) === choice ? null : choice);
    select(currentTabId());
  });
  select("beaufort-colindale");
</script>
</body>
</html>
