<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Beaufort Park flat search</title>
<style>
  :root {
    --bg: #0f1115; --card: #181b22; --line: #262b35; --txt: #e7e9ee;
    --muted: #9aa3b2; --new: #2ecc71; --gone: #ff6b6b; --accent: #4d8dff;
    --slow: #f1c40f; --stale: #e67e22; --problem: #ff5757;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--txt);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .wrap { max-width: 920px; margin: 0 auto; padding: 28px 18px 80px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
  .crit { background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; font-size: 13px; color: var(--muted); margin-bottom: 18px; }
  .crit b { color: var(--txt); }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 22px; }
  .stat { background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 14px; min-width: 92px; }
  .stat .n { font-size: 22px; font-weight: 700; }
  .stat .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 12px; position: relative; }
  .card.gone, .card.problem { opacity: .6; }
  .card.gone .title { text-decoration: line-through; }
  .card.problem { border-color: #4a2a2a; }
  .row1 { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .title { font-size: 17px; font-weight: 600; }
  .price { margin-left: auto; font-size: 18px; font-weight: 700; color: var(--accent); }
  .badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: .04em; }
  .badge.new { background: var(--new); color: #06210f; }
  .badge.gone { background: var(--gone); color: #2a0606; }
  .badge.slow { background: var(--slow); color: #2a2300; }
  .badge.stale { background: var(--stale); color: #2a1500; }
  .badge.problem { background: var(--problem); color: #2a0606; }
  .badge.btr { background: #1f6f54; color: #d6ffee; }
  .badge.private { background: #33384a; color: #c3cad8; }
  .meta { color: var(--muted); font-size: 13px; margin-top: 6px; display: flex;
    gap: 14px; flex-wrap: wrap; }
  .meta .k { color: var(--txt); }
  .dom { font-weight: 700; }
  .phase { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .src { display: inline-flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .src a { font-size: 12px; text-decoration: none; color: var(--accent);
    border: 1px solid var(--line); border-radius: 7px; padding: 4px 9px; }
  .src a:hover { border-color: var(--accent); }
  .sect { margin: 26px 0 10px; font-size: 13px; text-transform: uppercase;
    letter-spacing: .05em; color: var(--muted); }
  .epc { font-weight: 700; }
  .epc.B { color: #2ecc71; } .epc.C { color: #f1c40f; } .epc.D { color: #e67e22; }
  details { margin-top: 20px; } summary { cursor: pointer; color: var(--muted);
    font-size: 13px; text-transform: uppercase; letter-spacing: .05em; padding: 6px 0; }
  footer { color: var(--muted); font-size: 12px; margin-top: 30px; text-align: center; }
  footer code { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <h1>🏢 Beaufort Park flat search</h1>
  <div class="sub" id="sub"></div>
  <div class="crit" id="crit"></div>
  <div class="stats" id="stats"></div>
  <div id="active"></div>
  <div id="problemWrap"></div>
  <div id="goneWrap"></div>
  <footer>Regenerate with <code>/beaufort-flats</code> · newest blocks first · days-on-market shown live · stale (available &gt;5mo) hidden below.</footer>
</div>

<script id="data">

    { "id": "cornelia-house-1800", "building": "Cornelia House", "street": "Caversham Road", "phaseYear": 2019, "phaseLabel": "Completed ~2019 — newer", "price": 1800, "furnished": true, "available": "1 Jul 2026", "availableNow": false, "listedDate": "2026-04-23", "epc": "B", "sizeSqft": 553, "sources": [{ "platform": "zoopla", "url": "https://www.zoopla.co.uk/to-rent/details/73014569/", "agent": "EGRE" }], "scheme": "private", "operator": null, "schemeConfidence": "confirmed", "schemeSource": "live-listing", "firstSeen": "2026-06-25", "lastSeen": "2026-06-25", "status": "active", "isNew": false },
    { "id": "celeste-house-1733", "building": "Celeste House", "street": "Caversham Road", "phaseYear": 2019, "phaseLabel": "Completed ~2019/20 — newer", "price": 1733, "furnished": true, "available": "Ask agent", "availableNow": false, "listedDate": "2026-06-24", "epc": null, "sizeSqft": null, "sources": [{ "platform": "rightmove", "url": "https://www.rightmove.co.uk/properties/128666687", "agent": "LDM Properties" }], "scheme": "private", "operator": null, "schemeConfidence": "confirmed", "schemeSource": "live-listing", "firstSeen": "2026-06-25", "lastSeen": "2026-06-25", "status": "active", "isNew": false },
    { "id": "castleton-house-1700", "building": "Castleton House", "street": "Caversham Road", "phaseYear": 2019, "phaseLabel": "Completed ~2019 — newer (EPC C, age uncertain)", "price": 1700, "furnished": true, "available": "5 Aug 2026", "availableNow": false, "listedDate": "2026-06-03", "epc": "C", "sizeSqft": 548, "sources": [{ "platform": "zoopla", "url": "https://www.zoopla.co.uk/to-rent/details/73367780/", "agent": "Romans & Partners" }, { "platform": "rightmove", "url": "https://www.rightmove.co.uk/properties/89267967", "agent": "Romans & Partners" }], "scheme": "private", "operator": null, "schemeConfidence": "confirmed", "schemeSource": "live-listing", "firstSeen": "2026-06-25", "lastSeen": "2026-06-25", "status": "active", "isNew": false },
    { "id": "amelia-house-1650", "building": "Amelia House", "street": "Boulevard Drive", "phaseYear": 2012, "phaseLabel": "Earlier phase ~2010–13 — oldest (secure parking)", "price": 1650, "furnished": true, "available": "Now", "availableNow": true, "listedDate": "2026-04-18", "epc": "C", "sizeSqft": 454, "sources": [{ "platform": "zoopla", "url": "https://www.zoopla.co.uk/to-rent/details/72968081/", "agent": "London-Tokyo Property Services" }], "scheme": "private", "operator": null, "schemeConfidence": "confirmed", "schemeSource": "live-listing", "firstSeen": "2026-06-25", "lastSeen": "2026-06-25", "status": "active", "isNew": false },

    { "id": "reverence-house-1850", "building": "Reverence House", "street": "Colindale Gardens (Lismore Blvd)", "phaseYear": 2021, "phaseLabel": "Colindale Gardens (Redrow) — newer", "price": 1850, "furnished": true, "available": "Now", "availableNow": true, "listedDate": "2026-06-08", "epc": "B", "sizeSqft": null, "sources": [{ "platform": "zoopla", "url": "https://www.zoopla.co.uk/to-rent/details/62846794/", "agent": "Empire Chase" }], "scheme": "private", "operator": null, "schemeConfidence": "confirmed", "schemeSource": "live-listing", "firstSeen": "2026-06-25", "lastSeen": "2026-06-25", "status": "active", "isNew": true },
    { "id": "grevillea-house-1820", "building": "Grevillea House", "street": "Colindale Gardens (Bute Close)", "phaseYear": 2020, "phaseLabel": "Colindale Gardens (Redrow) — newer", "price": 1820, "furnished": true, "available": "15 Aug 2026", "availableNow": false, "listedDate": "2026-06-16", "epc": "B", "sizeSqft": null, "sources": [{ "platform": "zoopla", "url": "https://www.zoopla.co.uk/to-rent/details/63823885/", "agent": "Charles William" }], "scheme": "private", "operator": null, "schemeConfidence": "confirmed", "schemeSource": "live-listing", "firstSeen": "2026-06-25", "lastSeen": "2026-06-25", "status": "active", "isNew": true },
    { "id": "lismore-boulevard-1850", "building": "Lismore Boulevard", "street": "Colindale Gardens", "phaseYear": 2021, "phaseLabel": "Colindale Gardens (Redrow) new build — newer", "price": 1850, "furnished": true, "available": "Ask agent", "availableNow": false, "listedDate": null, "epc": null, "sizeSqft": null, "sources": [{ "platform": "zoopla", "url": "https://www.zoopla.co.uk/to-rent/details/73380741/", "agent": "Benham and Reeves" }], "scheme": "private", "operator": null, "schemeConfidence": "confirmed", "schemeSource": "live-listing", "firstSeen": "2026-06-25", "lastSeen": "2026-06-25", "status": "active", "isNew": true }
  ]
}/*DATA_END*/;
</script>

<script>
  const D = window.FLAT_DATA;
  const c = D.meta.criteria;
  const T = D.meta.staleThresholdsDays || { slow: 45, stale: 90, problem: 150 };

  // Days on market computed LIVE from the listed date, so it stays accurate whenever you open this file.
  function daysOnMarket(x) {
    if (!x.listedDate) return null;
    return Math.floor((Date.now() - new Date(x.listedDate + "T00:00:00")) / 86400000);
  }
  // Staleness only counts when the flat is available NOW. Future-dated availability = early marketing, not stale.
  function staleTier(x) {
    const d = daysOnMarket(x);
    if (d == null || !x.availableNow) return "ok";
    if (d > T.problem) return "problem";
    if (d > T.stale) return "stale";
    if (d > T.slow) return "slow";
    return "ok";
  }

  document.getElementById("sub").textContent =
    "Last run " + D.meta.lastRun + " · Zoopla + Rightmove (deduped) · days-on-market live as of today";
  document.getElementById("crit").innerHTML =
    "<b>" + c.area + "</b> · " + c.bedrooms + " bed / " + c.bathrooms + " bath · " +
    (c.furnished ? "furnished · " : "") + "£" + c.priceMin + "–" + c.priceMax + "/mo · " +
    "<b>priority:</b> " + c.priority +
    "<br><span style='font-size:12px'>🔴 hidden if available now &amp; on market &gt;" + T.problem + " days (≈5 months)</span>";

  // Rank: BTR first (quality/reliability), then newest block, then cheapest.
  const schemeRank = s => (s === "btr" ? 0 : 1);
  const all = D.listings.slice().sort((a, b) =>
    (schemeRank(a.scheme) - schemeRank(b.scheme)) ||
    (b.phaseYear - a.phaseYear) || (a.price - b.price));
  const gone = all.filter(x => x.status === "gone");
  const live = all.filter(x => x.status === "active");
  const problems = live.filter(x => staleTier(x) === "problem");
  const active = live.filter(x => staleTier(x) !== "problem");
  const newCount = active.filter(x => x.isNew).length;

  const stats = [
    ["Showing", active.length], ["New this run", newCount],
    ["Stale / hidden", problems.length], ["No longer listed", gone.length]
  ];
  document.getElementById("stats").innerHTML = stats.map(s =>
    '<div class="stat"><div class="n">' + s[1] + '</div><div class="l">' + s[0] + '</div></div>'
  ).join("");

  function domBadge(x) {
    const d = daysOnMarket(x);
    if (d == null) return "";
    const t = staleTier(x);
    const colour = t === "ok" ? "var(--muted)" : "var(--" + t + ")";
    const tag = t === "ok" ? "" : ' <span class="badge ' + t + '">' + t + '</span>';
    const note = x.availableNow ? "" : " (avail later)";
    return '<span class="dom" style="color:' + colour + '">on market ' + d + 'd' + note + '</span>' + tag;
  }

  function card(x) {
    const t = staleTier(x);
    const cls = x.status === "gone" ? "gone" : (t === "problem" ? "problem" : "");
    const badge = x.status === "gone"
      ? '<span class="badge gone">gone</span>'
      : (x.isNew ? '<span class="badge new">new</span>' : "");
    const epc = x.epc ? '<span class="k">EPC <span class="epc ' + x.epc + '">' + x.epc + '</span></span>' : '<span>EPC —</span>';
    const size = x.sizeSqft ? '<span><span class="k">' + x.sizeSqft + '</span> sqft</span>' : "";
    const avail = x.available ? '<span>avail <span class="k">' + x.available + '</span></span>' : "";
    const srcs = x.sources.map(s =>
      '<a href="' + s.url + '" target="_blank" rel="noopener">' +
      s.platform.charAt(0).toUpperCase() + s.platform.slice(1) + ' · ' + s.agent + ' ↗</a>').join("");
    const dupe = x.sources.length > 1 ? ' <span class="badge" style="background:#33384a;color:#9aa3b2">2 sources</span>' : "";
    const unverified = x.schemeConfidence && x.schemeConfidence !== "confirmed";
    const scheme = x.scheme === "btr"
      ? ' <span class="badge btr" title="' + (x.schemeConfidence || "") + (x.schemeSource ? " · " + x.schemeSource : "") + '">' +
        (unverified ? "BTR?" : "BTR") + (x.operator ? " · " + x.operator : "") + '</span>'
      : (x.scheme === "private" ? ' <span class="badge private">private landlord</span>' : "");
    return '<div class="card ' + cls + '">' +
      '<div class="row1"><span class="title">' + x.building + '</span>' + badge + scheme + dupe +
      '<span class="price">£' + x.price.toLocaleString() + '</span></div>' +
      '<div class="meta"><span>' + x.street + '</span>' + avail + epc + size + domBadge(x) +
      '<span>first seen ' + x.firstSeen + '</span></div>' +
      '<div class="phase">📅 ' + x.phaseLabel + '</div>' +
      '<div class="src">' + srcs + '</div></div>';
  }

  document.getElementById("active").innerHTML =
    '<div class="sect">Available — newest block first</div>' + active.map(card).join("");

  if (problems.length) {
    document.getElementById("problemWrap").innerHTML =
      '<details><summary>🔴 Likely problems — available but on market &gt;5 months (' +
      problems.length + ') — click to show</summary>' + problems.map(card).join("") + '</details>';
  }
  if (gone.length) {
    document.getElementById("goneWrap").innerHTML =
      '<details><summary>No longer listed — kept for history (' + gone.length +
      ')</summary>' + gone.map(card).join("") + '</details>';
  }
</script>
</body>
</html>
