name: Deploy flat-search viewer to GitHub Pages

# Publishes flat-search/flats.html as the site's index.html.
# flats.html is fully self-contained (data embedded inline; no fetch/module loads),
# so the "build" is just copying it to _site/index.html.

on:
  push:
    branches: [main]
    paths:
      - flat-search/flats.html
      - .github/workflows/pages.yml
  workflow_dispatch: {} # lets you trigger a manual redeploy from the Actions tab

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let the newest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (viewer becomes index.html)
        run: |
          mkdir -p _site
          cp flat-search/flats.html _site/index.html
          touch _site/.nojekyll   # skip Jekyll; serve files as-is

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
